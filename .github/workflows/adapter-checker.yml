name: Adapter Checker

on:
  push:
    branches:
      - main
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  adapter-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - run: npm ci
      - name: Run ioBroker Adapter Checker
        run: npx @iobroker/adapter-checker --input . --createIssues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
